<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400&family=Epilogue:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--w:#fff;--b:#0A0A0A;--b2:#141414;--b3:#1e1e1e;
--bl:#2563EB;--bl2:#1d4ed8;--bll:#EFF4FF;
--or:#F97316;--or2:#ea6c0a;--orl:#FFF4ED;
--g50:#f9f9f9;--g100:#f2f2f2;--g150:#ebebeb;--g200:#e0e0e0;--g300:#c7c7c7;--g400:#a0a0a0;--g500:#737373;--g600:#525252;--g700:#383838;--g800:#222;--g900:#111;
--ff:'Fraunces',serif;--fb:'Epilogue',sans-serif;
--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;--r32:32px;
--sh1:0 1px 4px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
--sh2:0 4px 20px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
--sh3:0 12px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.06);
--shbl:0 8px 24px rgba(37,99,235,.25);
--shor:0 8px 24px rgba(249,115,22,.25);
--ease:cubic-bezier(.22,1,.36,1);
}
html{scroll-behavior:smooth;font-size:16px;overflow-x:hidden}
body{font-family:var(--fb);background:var(--w);color:var(--b);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}button{cursor:pointer;border:none;background:none;font-family:inherit}
img{max-width:100%;display:block}input,select,textarea{font-family:inherit}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(1deg)}50%{transform:translateY(-8px) rotate(-1deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes drawLine{from{width:0}to{width:100%}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes spin{to{transform:rotate(360deg)}}

.anim-fu{animation:fadeUp .6s var(--ease) both}
.anim-fu-1{animation:fadeUp .6s var(--ease) .1s both}
.anim-fu-2{animation:fadeUp .6s var(--ease) .2s both}
.anim-fu-3{animation:fadeUp .6s var(--ease) .3s both}
.anim-fu-4{animation:fadeUp .6s var(--ease) .4s both}
.anim-sl{animation:slideRight .6s var(--ease) both}
.anim-fi{animation:fadeIn .5s var(--ease) both}
.anim-sc{animation:scaleIn .5s var(--ease) both}

.reveal{opacity:0;transform:translateY(28px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-1{transition-delay:.1s}.reveal-2{transition-delay:.15s}.reveal-3{transition-delay:.2s}.reveal-4{transition-delay:.25s}.reveal-5{transition-delay:.3s}.reveal-6{transition-delay:.35s}
.page-enter{animation:fadeUp .4s var(--ease) both}

/* ─── TICKER ─── */
.ticker{background:var(--b);color:rgba(255,255,255,.75);font-size:.7rem;font-weight:500;letter-spacing:.05em;padding:8px 0;overflow:hidden;position:relative;z-index:1001}
.ticker-track{display:flex;gap:48px;white-space:nowrap;animation:marquee 20s linear infinite}
.ticker-item{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ticker-dot{width:4px;height:4px;border-radius:50%;background:var(--or);flex-shrink:0}

/* ─── NAV ─── */
.nav{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,0,0,.07);transition:box-shadow .3s}
.nav.scrolled{box-shadow:0 4px 24px rgba(0,0,0,.08)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;gap:32px}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.nav-logo-img{height:36px;width:auto;object-fit:contain}
.nav-logo-fallback{display:flex;align-items:center;gap:10px}
.nav-logo-mark{width:36px;height:36px;background:var(--b);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:.75rem;font-weight:800;letter-spacing:-.01em;font-family:var(--ff);flex-shrink:0}
.nav-logo-mark em{color:var(--or);font-style:normal}
.nav-logo-text{font-family:var(--ff);font-size:1.2rem;font-weight:700;color:var(--b);letter-spacing:-.03em}
.nav-logo-text em{font-style:italic;color:var(--or)}
.nav-center{display:flex;align-items:center;gap:2px}
.nav-lk{position:relative;padding:8px 14px;font-size:.875rem;font-weight:500;color:var(--g500);cursor:pointer;border-radius:var(--r8);transition:color .2s,background .2s;letter-spacing:-.01em}
.nav-lk::after{content:'';position:absolute;bottom:4px;left:14px;right:14px;height:2px;background:var(--or);border-radius:2px;transform:scaleX(0);transition:transform .25s var(--ease);transform-origin:left}
.nav-lk:hover{color:var(--b);background:var(--g50)}
.nav-lk.active{color:var(--b);font-weight:600}
.nav-lk.active::after{transform:scaleX(1)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-wa-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--g150);border-radius:var(--r8);font-size:.8125rem;font-weight:500;color:var(--g600);transition:all .2s;cursor:pointer}
.nav-wa-btn:hover{border-color:var(--g300);color:var(--b);background:var(--g50)}
.nav-cta{padding:9px 20px;background:var(--or);color:white;border-radius:var(--r8);font-size:.8125rem;font-weight:700;transition:all .25s;cursor:pointer;letter-spacing:.01em}
.nav-cta:hover{background:var(--or2);transform:translateY(-1px);box-shadow:var(--shor)}
.ham{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer;border-radius:var(--r8);transition:background .2s}
.ham:hover{background:var(--g100)}
.ham span{display:block;width:20px;height:1.5px;background:var(--b);border-radius:2px;transition:all .3s var(--ease)}
.ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;top:109px;left:0;right:0;bottom:0;background:white;z-index:999;flex-direction:column;padding:16px 20px;overflow-y:auto;animation:slideDown .3s var(--ease)}
.mob-menu.open{display:flex}
.mob-lk{padding:14px 16px;border-radius:var(--r12);font-size:1rem;font-weight:500;color:var(--g700);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.mob-lk:hover,.mob-lk.active{background:var(--g50);color:var(--b)}
.mob-lk.active{font-weight:700}
.mob-divider{height:1px;background:var(--g100);margin:12px 0}
.mob-cta{margin-top:8px;padding:16px;background:var(--or);color:white;border-radius:var(--r16);font-size:1rem;font-weight:700;text-align:center;cursor:pointer}
.mob-wa{margin-top:10px;padding:14px;background:var(--g50);border:1.5px solid var(--g150);color:var(--b);border-radius:var(--r16);font-size:.9375rem;font-weight:500;text-align:center;cursor:pointer}

/* ─── CONTAINERS ─── */
.ct{max-width:1280px;margin:0 auto;padding:0 24px}
.ct-sm{max-width:960px;margin:0 auto;padding:0 24px}
.sec{padding:96px 0}.sec-sm{padding:64px 0}
@media(max-width:768px){.sec{padding:60px 0}.sec-sm{padding:40px 0}}

/* ─── EYEBROW ─── */
.ey{display:inline-flex;align-items:center;gap:8px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--or);margin-bottom:14px}
.ey::before{content:'';width:18px;height:2px;background:var(--or);border-radius:2px;flex-shrink:0}
.ey-b{color:var(--g400)}.ey-b::before{background:var(--g400)}

/* ─── HERO ─── */
.hero{padding:72px 0 80px;overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;top:-120px;right:-120px;width:600px;height:600px;background:radial-gradient(circle,rgba(249,115,22,.06) 0%,transparent 70%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 520px;gap:48px;align-items:center}
.hero-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:var(--g50);border:1px solid var(--g150);border-radius:20px;font-size:.75rem;font-weight:600;color:var(--g600);margin-bottom:24px}
.hero-tag-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
.h1{font-family:var(--ff);font-size:clamp(2.8rem,5.5vw,4.5rem);font-weight:800;line-height:1.08;letter-spacing:-.045em;color:var(--b);margin-bottom:24px}
.h1 em{font-style:italic;color:var(--or)}
.h2{font-family:var(--ff);font-size:clamp(1.8rem,3vw,2.75rem);font-weight:700;letter-spacing:-.04em;color:var(--b);margin-bottom:16px;line-height:1.15}
.h3{font-family:var(--ff);font-size:1.25rem;font-weight:700;letter-spacing:-.025em;color:var(--b);margin-bottom:10px}
.sub{font-size:1.0625rem;color:var(--g500);line-height:1.75;max-width:460px;margin-bottom:40px}
.hero-acts{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.btn-p{padding:14px 28px;background:var(--b);color:white;border-radius:var(--r12);font-size:.9375rem;font-weight:700;letter-spacing:-.01em;transition:all .25s var(--ease);cursor:pointer;display:inline-flex;align-items:center;gap:8px;border:2px solid transparent}
.btn-p:hover{background:var(--b2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.2)}
.btn-or{background:var(--or);color:white}
.btn-or:hover{background:var(--or2);box-shadow:var(--shor)}
.btn-s{padding:14px 28px;background:transparent;color:var(--b);border-radius:var(--r12);font-size:.9375rem;font-weight:500;letter-spacing:-.01em;border:1.5px solid var(--g200);transition:all .2s;cursor:pointer}
.btn-s:hover{border-color:var(--g400);background:var(--g50)}
.btn-wa{padding:14px 28px;background:#25D366;color:white;border-radius:var(--r12);font-size:.9375rem;font-weight:700;transition:all .25s;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.btn-wa:hover{background:#20bb59;transform:translateY(-2px);box-shadow:0 12px 32px rgba(37,211,102,.3)}
.btn-full{width:100%;justify-content:center}
.hero-stats{display:flex;gap:36px;margin-top:44px;padding-top:36px;border-top:1px solid var(--g150)}
.stat-n{font-family:var(--ff);font-size:2rem;font-weight:800;letter-spacing:-.04em;color:var(--b)}
.stat-l{font-size:.75rem;color:var(--g400);margin-top:2px;font-weight:500}

/* ─── HERO VISUAL ─── */
.hero-vis{position:relative;height:520px;display:flex;align-items:center;justify-content:center}
.hero-phone{position:relative;z-index:3;animation:floatA 6s ease-in-out infinite}
.hero-phone-wrap{width:220px;height:440px;border-radius:44px;background:var(--b);overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.35),0 0 0 2px rgba(255,255,255,.08) inset;position:relative}
.hero-phone-inner{width:100%;height:100%;object-fit:cover;display:block}
.hero-phone-bar{position:absolute;top:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);display:flex;align-items:center;justify-content:space-between}
.hero-phone-bar-ico{font-size:.65rem;color:rgba(255,255,255,.8)}
.hero-pill{position:absolute;background:white;border-radius:var(--r16);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh3);z-index:4}
.hero-pill-1{top:48px;right:-16px;animation:floatB 5s ease-in-out infinite}
.hero-pill-2{bottom:72px;left:-20px;animation:floatA 5.5s ease-in-out infinite 1s}
.hero-pill-3{top:48%;left:-28px;transform:translateY(-50%);animation:floatB 5s ease-in-out infinite 2s}
.hero-pill-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.hero-pill-t{font-size:.72rem;font-weight:700;color:var(--b);line-height:1.2}
.hero-pill-s{font-size:.62rem;color:var(--g400);margin-top:1px}
.hero-bg-circle{position:absolute;border-radius:50%;z-index:1}
.hero-bg-c1{width:360px;height:360px;background:var(--g50);top:50%;left:50%;transform:translate(-50%,-50%)}
.hero-bg-c2{width:240px;height:240px;border:1.5px solid var(--g100);top:50%;left:50%;transform:translate(-50%,-50%)}

/* ─── CATEGORIES ─── */
.cat-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.cat-crd{border-radius:var(--r24);overflow:hidden;cursor:pointer;transition:transform .35s var(--ease),box-shadow .35s var(--ease);position:relative}
.cat-crd:hover{transform:translateY(-6px);box-shadow:var(--sh3)}
.cat-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;transition:transform .5s var(--ease)}
.cat-crd:hover .cat-bg{transform:scale(1.04)}
.cat-ov{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.3) 100%)}
.cat-cnt{position:relative;z-index:2;height:300px;display:flex;flex-direction:column;justify-content:flex-end;padding:32px}
.cat-em{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.cat-t{font-family:var(--ff);font-size:2rem;font-weight:800;color:white;letter-spacing:-.04em;line-height:1.1}
.cat-s{font-size:.85rem;color:rgba(255,255,255,.55);margin:6px 0 20px}
.cat-b{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:white;color:var(--b);border-radius:var(--r8);font-size:.8rem;font-weight:700;transition:background .2s,gap .2s;width:fit-content}
.cat-crd:hover .cat-b{gap:10px;background:var(--or);color:white}

/* ─── PHONE CARDS ─── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:48px}
.pcrd{background:white;border:1px solid var(--g150);border-radius:var(--r20);overflow:hidden;cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s var(--ease),border-color .3s}
.pcrd:hover{transform:translateY(-5px);box-shadow:var(--sh3);border-color:var(--g200)}
.pcrd-img{height:220px;background:var(--g50);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.pcrd-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.pcrd:hover .pcrd-img img{transform:scale(1.06)}
.pcrd-img-fallback{font-size:5rem;line-height:1}
.pcrd-body{padding:16px 20px 20px}
.pcrd-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tg{font-size:.63rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.tg-br{background:var(--g100);color:var(--g600)}
.tg-nw{background:#dcfce7;color:#166534}
.tg-gd{background:#dbeafe;color:#1e40af}
.tg-fr{background:#fef9c3;color:#854d0e}
.pcrd-n{font-family:var(--ff);font-size:.9375rem;font-weight:700;color:var(--b);margin-bottom:4px;line-height:1.3;letter-spacing:-.02em}
.pcrd-sp{font-size:.78rem;color:var(--g400);margin-bottom:16px;line-height:1.6}
.pcrd-ft{display:flex;justify-content:space-between;align-items:center}
.prc{font-family:var(--ff);font-size:1.2rem;font-weight:800;color:var(--b);letter-spacing:-.03em}
.prc sup{font-size:.75em;vertical-align:super;font-weight:700}
.wa-b{width:38px;height:38px;background:#25D366;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:1rem}
.wa-b:hover{background:#20bb59;transform:scale(1.06)}

/* ─── WHY ─── */
.why-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px}
.why-c{padding:32px;border-radius:var(--r20);border:1px solid var(--g100);transition:all .3s var(--ease);cursor:default;position:relative;overflow:hidden}
.why-c::before{content:'';position:absolute;inset:0;background:var(--g50);opacity:0;transition:opacity .3s}
.why-c:hover{border-color:var(--g200);box-shadow:var(--sh2);transform:translateY(-3px)}
.why-c:hover::before{opacity:1}
.why-ic{width:52px;height:52px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;font-size:1.35rem;margin-bottom:20px;position:relative;z-index:1}
.why-ic-bl{background:var(--bll)}
.why-ic-or{background:var(--orl)}
.why-ic-dk{background:var(--g100)}
.why-t{font-family:var(--ff);font-size:1rem;font-weight:700;margin-bottom:10px;letter-spacing:-.02em;position:relative;z-index:1}
.why-d{font-size:.875rem;color:var(--g500);line-height:1.7;position:relative;z-index:1}

/* ─── WA CTA ─── */
.wa-sec{background:var(--b);border-radius:var(--r32);padding:72px 64px;text-align:center;position:relative;overflow:hidden;margin:0 24px}
.wa-sec::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(249,115,22,.08);top:-100px;left:-100px}
.wa-sec::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(37,99,235,.06);bottom:-150px;right:-100px}
.wa-sec-t{font-family:var(--ff);font-size:clamp(2rem,4vw,3rem);font-weight:800;color:white;margin-bottom:16px;position:relative;z-index:1;letter-spacing:-.04em}
.wa-sec-s{color:rgba(255,255,255,.45);font-size:1rem;margin-bottom:40px;position:relative;z-index:1;max-width:440px;margin-left:auto;margin-right:auto;line-height:1.7}
.wa-sec .btn-wa{position:relative;z-index:1;margin:0 auto;font-size:1rem;padding:16px 32px}

/* ─── SECTION HEADERS ─── */
.sh{text-align:center;max-width:560px;margin:0 auto}
.sh-l{max-width:600px;margin:0}
.sh-l .h2{text-align:left}
.sh-l .sub{text-align:left}
.sh-flex{display:flex;align-items:flex-end;justify-content:space-between}

/* ─── FOOTER ─── */
.ft{background:var(--g900);color:white;padding:64px 0 32px}
.ft-g{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.ft-br{font-family:var(--ff);font-size:1.25rem;font-weight:800;margin-bottom:12px;letter-spacing:-.03em}
.ft-br em{font-style:italic;color:var(--or)}
.ft-d{font-size:.875rem;color:rgba(255,255,255,.35);line-height:1.75;max-width:260px}
.ft-h{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:16px}
.ft-ls{display:flex;flex-direction:column;gap:10px}
.ft-lk{font-size:.875rem;color:rgba(255,255,255,.5);cursor:pointer;transition:color .2s}
.ft-lk:hover{color:white}
.ft-bot{border-top:1px solid rgba(255,255,255,.07);padding-top:28px;display:flex;justify-content:space-between;align-items:center}
.ft-cp{font-size:.75rem;color:rgba(255,255,255,.25)}
.ft-cp em{color:var(--or);font-style:normal}
.ft-badges{display:flex;gap:8px}
.ft-badge{padding:4px 12px;border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:.65rem;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.05em;text-transform:uppercase}

/* ─── SHOP ─── */
.shop-pg-hero{padding:56px 0 40px;border-bottom:1px solid var(--g100)}
.s-cats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:36px}
.scat{border:1.5px solid var(--g150);border-radius:var(--r16);padding:24px 28px;cursor:pointer;transition:all .3s var(--ease);display:flex;align-items:center;justify-content:space-between;background:white}
.scat:hover{border-color:var(--b);background:var(--g50);transform:translateY(-2px);box-shadow:var(--sh2)}

/* ── HOOKS ── */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});
    },{threshold:.12});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  });
}

function useScroll(){
  const[sc,setSc]=useState(false);
  useEffect(()=>{
    const h=()=>setSc(window.scrollY>10);
    window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);
  },[]);
  return sc;
}

/* ── APP ── */
function App(){
  const[page,setPage]=useState('home');
  const[sp,setSP]=useState(null);
  const[sc,setSC]=useState(null);
  const go=p=>{setPage(p);window.scrollTo({top:0,behavior:'smooth'});};
  const setShopCat=cat=>{setSC(cat);go('shop');};
  return h('div',null,
    h(Nav,{page,go}),
    page==='home'&&h(Home,{go,setSP,setSC:setShopCat}),
    page==='shop'&&h(Shop,{go,setSP,initCat:sc}),
    page==='product'&&h(Product,{phone:sp,go}),
    page==='about'&&h(About,{go}),
    page==='contact'&&h(Contact,{go}),
    page==='admin'&&h(Admin)
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
